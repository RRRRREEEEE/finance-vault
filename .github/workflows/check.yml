name: 笔记质检

on:
  push:
    paths:
      - "**.md"
      - "999-Attachments/**"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install pyyaml

      - name: 运行质检
        run: python .github/scripts/check.py
